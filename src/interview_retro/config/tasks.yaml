transcription_task:
  description: >
    Clean and structure the raw interview transcript for {company_name}.
    Label every turn as INTERVIEWER or CANDIDATE and fix transcription errors.
    Preserve all content — do not summarize or omit anything.
  expected_output: >
    JSON with a structured_transcript array of speaker-labeled turns, each
    with speaker, text, and timestamp_seconds fields.
  agent: transcription_agent

qa_extraction_task:
  description: >
    Extract every question-answer pair from the structured transcript of this
    {company_name} interview for the {role} position ({stage}).
    Categorize and timestamp each pair.
  expected_output: >
    JSON with a qa_pairs array of objects containing question, answer,
    category, and timestamp_seconds.
  agent: qa_extractor_agent

advocate_task:
  description: >
    For each Q&A pair in this {company_name} {stage} interview, build the
    strongest honest case that the candidate answered well. Be specific and
    thorough — vague praise is useless.
  expected_output: >
    JSON with an advocacy array containing strengths and advocate_summary
    for each Q&A pair.
  agent: advocate_agent

critic_task:
  description: >
    Read the advocate's case for each answer in this {company_name} interview
    and argue specifically why it falls short. Challenge every claimed strength
    with a concrete counter.
  expected_output: >
    JSON with a criticism array containing weaknesses, rebuttal_of_advocate,
    and critic_summary for each Q&A pair.
  agent: critic_agent

judge_task:
  description: >
    Weigh the advocate's and critic's arguments for each answer in this
    {company_name} {stage} interview for {role}. Deliver a final calibrated
    score (0.0–10.0) and actionable feedback referencing both sides.
  expected_output: >
    JSON with rated_qa array (score, feedback, suggested_answer per pair),
    plus overall_score, strengths, weaknesses, and summary.
  agent: judge_agent
